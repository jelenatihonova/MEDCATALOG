<div class="wrap">
<h2>Enter your email to receive payment instructions</h2>

<form action="https://formsubmit.co/jelena.tihonova@proton.me" method="POST">

    <input type="email" name="email" placeholder="Your email" required>

    <input type="hidden" name="product" id="productField">

<script>
const params = new URLSearchParams(window.location.search);
const product = params.get('product');

let amount="";
if(product==="extended20") amount="45€";
if(product==="extended40") amount="75€";

document.getElementById("productField").value = product;
document.getElementById("nextPage").value =
"https://balticservice.org/pay.html?product="+product+"&amount="+amount;

</script>
